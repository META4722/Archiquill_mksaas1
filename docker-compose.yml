services:
  app:
    image: ghcr.io/meta4722/archiquill_mksaas1:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.archiquill.rule=Host(`archiquill.com`) || Host(`www.archiquill.com`)"
      - "traefik.http.routers.archiquill.entrypoints=websecure"
      - "traefik.http.routers.archiquill.tls.certresolver=letsencrypt"
      - "traefik.http.services.archiquill.loadbalancer.server.port=3000"
      - "traefik.http.routers.archiquill.middlewares=archiquill-www-redirect"
      - "traefik.http.middlewares.archiquill-www-redirect.redirectregex.regex=^https://www\\.archiquill\\.com/(.*)"
      - "traefik.http.middlewares.archiquill-www-redirect.redirectregex.replacement=https://archiquill.com/$${1}"
      - "traefik.http.middlewares.archiquill-www-redirect.redirectregex.permanent=true"
